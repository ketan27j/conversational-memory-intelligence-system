services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cmis_postgres
    environment:
      POSTGRES_DB: cmis
      POSTGRES_USER: cmis
      POSTGRES_PASSWORD: cmis_dev_only
    ports:
      - "5433:5432"
    volumes:
      - cmis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmis -d cmis"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  cmis_postgres_data:
